# ============================================================================
# SIBO ERP — Configuración de Nginx (reverse proxy delante de Django/Gunicorn)
# ============================================================================
# Nginx recibe TODO el tráfico HTTP del navegador (puerto 80), sirve los
# archivos estáticos/media directamente (rápido) y reenvía el resto a Django.
# ----------------------------------------------------------------------------

# "upstream" = a dónde reenvía Nginx las peticiones dinámicas.
# "web" es el nombre del servicio Django en docker-compose; 8000 su puerto interno.
upstream sibo_web {
    server web:8000;
}

server {
    listen 80;

    # Acepta el dominio raíz y CUALQUIER subdominio *.localhost.
    # Esto es lo que permite a futuro cliente1.localhost, cliente2.localhost, etc.
    server_name localhost *.localhost;

    # Tamaño máximo de subida (uploads de archivos a MinIO más adelante).
    client_max_body_size 20M;

    # --- Archivos estáticos: los sirve Nginx directamente, sin tocar Django. ---
    location /static/ {
        alias /app/staticfiles/;
    }

    # --- Archivos media (uploads) ---
    location /media/ {
        alias /app/media/;
    }

    # --- Todo lo demás se reenvía a Django (Gunicorn). ---
    location / {
        proxy_pass http://sibo_web;

        # CRÍTICO para django-tenants: debe llegar el Host original (ej.
        # "cliente1.localhost"), porque de ese header se resuelve QUÉ tenant
        # atiende la petición. Si se pierde, el multitenancy no funciona.
        proxy_set_header Host $host;

        # Cabeceras estándar para que Django conozca la IP/protocolo reales
        # del cliente (auditoría, seguridad, generación de URLs).
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}
